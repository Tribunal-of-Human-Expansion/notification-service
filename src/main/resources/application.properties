spring.application.name=notification-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/notification_db
spring.datasource.username=postgres
spring.datasource.password=2211
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

spring.kafka.bootstrap-servers=localhost:9092

booking.kafka.topic=booking-events
spring.kafka.consumer.group-id=notification-service-group-v2
spring.kafka.consumer.auto-offset-reset=latest

spring.kafka.consumer.key-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

spring.kafka.consumer.properties.spring.deserializer.key.delegate.class=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.value.default.type=com.gtbs.notificationservice.notification.dto.BookingEvent
spring.kafka.consumer.properties.spring.json.trusted.packages=com.gtbs.notificationservice.notification.dto

spring.kafka.consumer.properties.spring.json.trusted.packages=*
